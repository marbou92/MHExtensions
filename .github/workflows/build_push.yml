name: CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 80
  IS_PR_CHECK: false

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.generate-matrices.outputs.matrix }}
      delete: ${{ steps.generate-matrices.outputs.delete }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last successful CI commit
        uses: nrwl/nx-set-shas@v5
        with:
          fallback-sha: 4b825dc642cb6eb9a060e54bf8d69288fbee4904 # empty tree

      - id: generate-matrices
        name: Create output matrices
        run: |
          python ./.github/scripts/generate-build-matrices.py "$NX_BASE" Debug

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ matrix.chunk.number > 1 }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Optional signing — only runs if you've set the SIGNING_KEY secret.
      # Debug builds (the default here) don't need it, so this is a no-op until
      # you switch the build type to Release and configure the secrets.
      - name: Prepare signing key
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: |
          echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew $MODULES

      - name: Upload APKs (${{ matrix.chunk.number }})
        uses: actions/upload-artifact@v4
        with:
          name: "individual-apks-${{ matrix.chunk.number }}"
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
            **/build/outputs/jar/release/*.jar
            **/build/keiyoushi-source-info.json
          retention-days: 30
          if-no-files-found: error

      - name: Clean up CI files
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: rm -f signingkey.jks

  # -----------------------------------------------------------------------
  # Publish job (OPTIONAL)
  # -----------------------------------------------------------------------
  # This publishes the built APKs to a `repo` branch of the SAME repository
  # (so Mihon can read index.min.json from
  #  https://raw.githubusercontent.com/<you>/<repo>/repo/index.min.json).
  #
  # It is DISABLED by default. To enable it:
  #   1. Set up signing secrets (SIGNING_KEY, ALIAS, KEY_STORE_PASSWORD,
  #      KEY_PASSWORD) so release APKs can be signed.
  #   2. Change the build type above from "Debug" back to "Release".
  #   3. Change `if: false` below to `if: true`.
  #   4. Edit .github/scripts/publish-repo.py to point APK_BASE_URL /
  #      JAR_BASE_URL / ICON_BASE_URL at your repo and set your signingKey
  #      fingerprint + name.
  # -----------------------------------------------------------------------
  publish:
    name: Publish extension repo (disabled)
    needs: [prepare, build]
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ~/apk-artifacts

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: main

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          ref: repo
          path: repo
          persist-credentials: true

      - name: Publish and deploy repo
        env:
          DELETE: ${{ needs.prepare.outputs.delete }}
        run: |
          cd repo
          pip install protobuf
          python ../main/.github/scripts/publish-repo.py "$DELETE"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git status
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update extensions repo"
            git push
          else
            echo "No changes to commit"
          fi
