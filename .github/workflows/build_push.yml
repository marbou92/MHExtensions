name: CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 80
  IS_PR_CHECK: false

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.generate-matrices.outputs.matrix }}
      delete: ${{ steps.generate-matrices.outputs.delete }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last successful CI commit
        uses: nrwl/nx-set-shas@v5
        with:
          fallback-sha: 4b825dc642cb6eb9a060e54bf8d69288fbee4904 # empty tree

      - id: generate-matrices
        name: Create output matrices
        run: |
          python ./.github/scripts/generate-build-matrices.py "$NX_BASE" Debug

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ matrix.chunk.number > 1 }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
        run: |
          ./gradlew $MODULES

      - name: Upload APKs (${{ matrix.chunk.number }})
        uses: actions/upload-artifact@v4
        with:
          name: "individual-apks-${{ matrix.chunk.number }}"
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
            **/build/outputs/jar/release/*.jar
            **/build/keiyoushi-source-info.json
          retention-days: 30
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Publish job (OPTIONAL — disabled by default)
  # -----------------------------------------------------------------------
  # This publishes the built APKs to a `repo` branch of the SAME repository
  # so Mihon can read index.min.json from:
  #   https://raw.githubusercontent.com/<you>/<repo>/repo/index.min.json
  #
  # To enable it:
  #   1. Generate a signing keystore and add these repository secrets:
  #        SIGNING_KEY         — base64 of your .jks file  (run: base64 -w0 signingkey.jks)
  #        ALIAS               — your key alias
  #        KEY_STORE_PASSWORD  — keystore password
  #        KEY_PASSWORD        — key password
  #   2. Change the build type in the prepare step above from "Debug" to "Release".
  #   3. Add the signing-key steps back into the build job (see comments below).
  #   4. Change `if: false` to `if: true` in the publish job below.
  #   5. Edit .github/scripts/publish-repo.py to set your APK_BASE_URL /
  #      JAR_BASE_URL / ICON_BASE_URL / signingKey / name.
  #
  # When you re-enable release signing, add these steps to the build job
  # (BEFORE the "Build extensions" step):
  #
  #   - name: Prepare signing key
  #     run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > signingkey.jks
  #
  #   - name: Build extensions
  #     env:
  #       MODULES: ${{ join(matrix.chunk.modules, ' ') }}
  #       ALIAS: ${{ secrets.ALIAS }}
  #       KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
  #       KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
  #     run: ./gradlew $MODULES
  #
  #   - name: Clean up signing key
  #     if: always()
  #     run: rm -f signingkey.jks
  # -----------------------------------------------------------------------
  publish:
    name: Publish extension repo (disabled)
    needs: [prepare, build]
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ~/apk-artifacts

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: main

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          ref: repo
          path: repo
          persist-credentials: true

      - name: Publish and deploy repo
        env:
          DELETE: ${{ needs.prepare.outputs.delete }}
        run: |
          cd repo
          pip install protobuf
          python ../main/.github/scripts/publish-repo.py "$DELETE"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git status
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update extensions repo"
            git push
          else
            echo "No changes to commit"
          fi
